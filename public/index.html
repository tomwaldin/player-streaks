<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Streaks — Ruby Sweeps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: #888;
    }

    .controls {
      max-width: 1100px;
      margin: 0 auto 1rem;
    }

    .search-wrap {
      position: relative;
      max-width: 320px;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.875rem;
      outline: none;
    }

    .search-wrap input:focus {
      border-color: #555;
    }

    .search-wrap input::placeholder { color: #555; }

    .table-wrap {
      max-width: 1100px;
      margin: 0 auto;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2a2a3a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead { background: #1a1a28; }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      white-space: nowrap;
      border-bottom: 1px solid #2a2a3a;
    }

    tbody tr {
      border-bottom: 1px solid #1e1e2e;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #16162a; }

    tbody td {
      padding: 0.65rem 1rem;
      white-space: nowrap;
      color: #d0d0e0;
    }

    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: #666;
      font-size: 0.875rem;
    }

    .status.error { color: #e06c75; }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      animation: pulse 1.2s ease-in-out infinite;
      margin-right: 0.4rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Player Streaks</h1>
    <p>ruby_sweeps.gold.user_streaks — active, latest date</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search user ID…" autocomplete="off" />
      <datalist id="user-ids"></datalist>
    </div>
  </div>

  <div class="table-wrap">
    <div class="status" id="status">
      <span class="dot"></span> Loading&hellip;
    </div>
    <table id="table" style="display:none">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    let allRows = [];
    let cols = [];

    function renderRows(rows) {
      const tbody = document.getElementById('tbody');
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#666;padding:2rem">No matching users</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(row =>
        '<tr>' + cols.map(c => `<td>${row[c] ?? ''}</td>`).join('') + '</tr>'
      ).join('');
    }

    function onSearch(e) {
      const q = e.target.value.trim().toLowerCase();
      const filtered = q
        ? allRows.filter(r => String(r[cols[0]] ?? '').toLowerCase().includes(q))
        : allRows;
      renderRows(filtered);
    }

    async function load() {
      const statusEl = document.getElementById('status');
      const tableEl  = document.getElementById('table');
      const theadEl  = document.getElementById('thead');
      const datalist = document.getElementById('user-ids');
      const search   = document.getElementById('search');

      try {
        const res = await fetch('/leaderboard');
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const { rows } = await res.json();

        if (!rows || rows.length === 0) {
          statusEl.textContent = 'No data returned.';
          return;
        }

        allRows = rows;
        cols = Object.keys(rows[0]);

        // assume first column is user id — populate datalist
        const userIdCol = cols[0];
        const uniqueIds = [...new Set(rows.map(r => r[userIdCol]))];
        datalist.innerHTML = uniqueIds.map(id => `<option value="${id}">`).join('');
        search.setAttribute('list', 'user-ids');

        theadEl.innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';
        renderRows(allRows);

        statusEl.style.display = 'none';
        tableEl.style.display = 'table';

        search.addEventListener('input', onSearch);
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    load();
  </script>
</body>
</html>
